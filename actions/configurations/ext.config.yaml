            IO_EVENTS_EVENT_CODE: $IO_EVENTS_EVENT_CODE
            IO_EVENTS_API_KEY: $IO_EVENTS_API_KEY
          annotations:
            require-adobe-auth: false
            include-ims-credentials: true
            final: true
        system-config-schema:
