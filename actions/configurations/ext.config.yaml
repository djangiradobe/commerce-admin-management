operations:
  view:
    - type: web
      impl: index.html
# Action sources live alongside this manifest (same directory).
actions: .
# Host App Builder apps override `web` to point at their UI shell (see README).
# Path is relative to this file. Scoped layout means we have to climb out
# of: configurations/ → actions/ → commerce-admin-management/ → @adobedjangir/ →
# node_modules/ → project root → web-src/. That's five `..` segments.
web: ../../../../../web-src
runtimeManifest:
  database:
    auto-provision: true
    region: emea
  packages:
    admin-ui-sdk:
      license: Apache-2.0
      actions:
        registration:
          function: registration/index.js
          web: 'yes'
          runtime: 'nodejs:20'
          inputs:
            LOG_LEVEL: debug
            APP_TITLE: $APP_TITLE
            APP_SECTION_TITLE: $APP_SECTION_TITLE
            APP_PAGE_TITLE: $APP_PAGE_TITLE
          annotations:
            require-adobe-auth: true
            final: true
    CommerceAdminManagement:
      license: Apache-2.0
      actions:
        # Commerce REST creds are NOT injected here — they live encrypted in
        # ABDB and are loaded per-call by actions/commerce-creds.js.
        commerce-rest-get:
          function: commerce/index.js
          web: 'yes'
          runtime: 'nodejs:20'
          inputs:
            LOG_LEVEL: debug
            SYSTEM_CONFIG_CRYPT_KEY: $SYSTEM_CONFIG_CRYPT_KEY
            OAUTH_CLIENT_ID: $OAUTH_CLIENT_ID
            OAUTH_CLIENT_SECRET: $OAUTH_CLIENT_SECRET
            OAUTH_ORG_ID: $OAUTH_ORG_ID
            OAUTH_SCOPES: $OAUTH_SCOPES
            IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
            IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
            IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
            IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
            AIO_DB_REGION: $AIO_DB_REGION
            SUPER_ADMIN_EMAILS: $SUPER_ADMIN_EMAILS
          annotations:
            require-adobe-auth: false
            include-ims-credentials: true
            final: true
        system-config-list:
          function: system-config-list/index.js
          web: 'yes'
          runtime: 'nodejs:20'
          inputs:
            LOG_LEVEL: debug
            SYSTEM_CONFIG_CRYPT_KEY: $SYSTEM_CONFIG_CRYPT_KEY
            OAUTH_CLIENT_ID: $OAUTH_CLIENT_ID
            OAUTH_CLIENT_SECRET: $OAUTH_CLIENT_SECRET
            OAUTH_ORG_ID: $OAUTH_ORG_ID
            OAUTH_SCOPES: $OAUTH_SCOPES
            IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
            IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
            IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
            IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
            AIO_DB_REGION: $AIO_DB_REGION
            SUPER_ADMIN_EMAILS: $SUPER_ADMIN_EMAILS
          annotations:
            require-adobe-auth: false
            include-ims-credentials: true
            final: true
        system-config-save:
          function: system-config-save/index.js
          web: 'yes'
          runtime: 'nodejs:20'
          inputs:
            LOG_LEVEL: debug
            SYSTEM_CONFIG_CRYPT_KEY: $SYSTEM_CONFIG_CRYPT_KEY
            OAUTH_CLIENT_ID: $OAUTH_CLIENT_ID
            OAUTH_CLIENT_SECRET: $OAUTH_CLIENT_SECRET
            OAUTH_ORG_ID: $OAUTH_ORG_ID
            OAUTH_SCOPES: $OAUTH_SCOPES
            IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
            IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
            IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
            IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
            AIO_DB_REGION: $AIO_DB_REGION
            SUPER_ADMIN_EMAILS: $SUPER_ADMIN_EMAILS
